<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>意义与方向书单</title>
    <meta
      name="description"
      content="关于动力、倦怠、时间与意义的阅读书单，由浅入深排列。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="meaning">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html">Huoyuuu</a>
        <nav class="nav">
          <a href="./index.html">首页</a>
          <a href="./catalog.html">书单目录</a>
          <a href="./links.html">Links</a>
        </nav>
      </div>
    </header>

    <main class="container reading-page">
      <section class="page-intro">
        <p class="eyebrow">READING NAVIGATION</p>
        <a class="back-link" href="./catalog.html">&larr; 返回目录</a>
        <h1 data-reading-title>意义与方向书单</h1>
        <p class="intro-text" data-reading-intro>
          正在从 Markdown 加载阅读书目……
        </p>
        <div class="intro-chips">
          <span>面向：<strong data-reading-audience>研究生</strong></span>
          <span>顺序：<strong data-reading-order>由浅入深</strong></span>
          <span>当前条目：<strong data-reading-count>0</strong></span>
          <span class="progress-stats" data-progress-stats></span>
        </div>
      </section>

      <section class="section-block filter-block" id="filter-section">
        <div class="filter-row">
          <input
            class="search-input"
            type="text"
            placeholder="搜索书名、作者或简介…"
            data-page-search
            aria-label="页面内搜索"
          />
        </div>
        <div class="filter-chips" data-filter-chips></div>
      </section>

      <div class="mini-toc-wrapper">
        <details class="mini-toc" data-mini-toc>
          <summary>页面目录</summary>
          <ol data-mini-toc-list></ol>
        </details>
      </div>

      <div
        id="reading-content"
        data-reading-source="./content/meaning.md"
        aria-live="polite"
      >
        <div class="loading-card">正在加载阅读书目……</div>
      </div>

      <section
        class="section-block comments-block"
        id="comments"
        data-repo="Huoyuuu/personal-graduate-reading-guide"
        data-repo-id="R_kgDOR3nGEg"
        data-category="Comments"
        data-category-id="DIC_kwDOR3nGEs4C52l-"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="light"
        data-lang="zh-CN"
      >
        <div class="section-heading">
          <p class="eyebrow">COMMENTS</p>
          <h2>评论与补充</h2>
          <p class="section-note">
            欢迎用 GitHub 账号留言、补链接或提醒更新。
          </p>
        </div>
        <div class="giscus-shell" data-comments-setup>
          评论区加载中……
        </div>
        <div class="giscus" data-giscus-container></div>
      </section>

      <noscript>
        <section class="section-block">
          <p class="section-note">
            这个页面需要开启 JavaScript，才能从 Markdown 文件加载内容。
          </p>
        </section>
      </noscript>
    </main>

    <button class="back-to-top" data-back-to-top aria-label="返回顶部">&uarr;</button>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© <span data-year></span> Huoyuuu</p>
        <p><a href="./index.html">返回首页</a></p>
      </div>
    </footer>

    <script src="./assets/script.js"></script>
  </body>
</html>
